<svg xmlns="http://www.w3.org/2000/svg" width="900" height="240" viewBox="0 0 900 240">
  <rect width="900" height="240" fill="#f7f7f7"/>
  <g transform="translate(50,40)">
    <!-- W = 800, h = 96 -->
    <rect x="0" y="0" width="800" height="96" fill="white" stroke="#777" stroke-width="2"/>
    <!-- User coordinate points converted from bottom-left to SVG top-left:
         (0,0)->(0,96), (0,h)->(0,0), (W-h,h)->(704,0),
         (W-1.5h,h/2)->(656,48), (1.5h,h/2)->(144,48),
         (h,0)->(96,96) -->
    <path d="M 0 96 L 0 0 L 704 0 L 656 48 L 144 48 L 96 96 Z"
          fill="#dbe8f3" stroke="#1d3f5f" stroke-width="3"/>
    <circle cx="0" cy="96" r="5" fill="#1d3f5f"/>
    <circle cx="0" cy="0" r="5" fill="#1d3f5f"/>
    <circle cx="704" cy="0" r="5" fill="#1d3f5f"/>
    <circle cx="656" cy="48" r="5" fill="#1d3f5f"/>
    <circle cx="144" cy="48" r="5" fill="#1d3f5f"/>
    <circle cx="96" cy="96" r="5" fill="#1d3f5f"/>
    <text x="16" y="25" font-family="Arial" font-size="18" fill="#1d3f5f">UNDO TEXT LANE</text>
    <text x="784" y="78" text-anchor="end" font-family="Arial" font-size="18" fill="#7a3a24">MIRRORED REDO LANE WOULD LIVE HERE</text>
    <text x="34" y="76" font-family="Arial" font-size="34" font-weight="700" fill="#1d3f5f">&lt;=</text>
    <g font-family="Arial" font-size="12" fill="#333">
      <text x="0" y="118">(0,0)</text>
      <text x="0" y="-10">(0,h)</text>
      <text x="704" y="-10" text-anchor="middle">(W-h,h)</text>
      <text x="656" y="42" text-anchor="middle">(W-1.5h,h/2)</text>
      <text x="144" y="42" text-anchor="middle">(1.5h,h/2)</text>
      <text x="96" y="118" text-anchor="middle">(h,0)</text>
    </g>
  </g>
</svg>
